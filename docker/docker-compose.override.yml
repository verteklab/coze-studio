services:
  coze-server:
    image: coze-studio-server-local:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    extra_hosts:
      - "host.docker.internal:host-gateway"
  coze-web:
    image: coze-studio-web-local:latest
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        # daocloud mirror started returning 401 (anonymous access disabled);
        # fall back to Docker Hub directly. If pulls slow down, switch back to
        # a working mirror (1ms.run / tuna) instead of daocloud.
        NODE_IMAGE: node:22-alpine
        NGINX_IMAGE: nginx:1.25-alpine