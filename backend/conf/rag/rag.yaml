rag:
  base_url: "${RAG_BASE_URL:http://rag-web:8000}"
  timeout_ms: 10000
  upload_timeout_ms: 60000
  # 60s default covers worst-case hybrid retrieval with all 4 query_strategy
  # enhancements on: rewrite + expansion + multi_query each cost 1 LLM call
  # (serial, ~3-6s each), then dense + bm25 ES searches per variant, plus
  # rerank. Override via RAG_RETRIEVAL_TIMEOUT_MS for deployments with
  # slower LLM/rerank backends.
  retrieval_timeout_ms: ${RAG_RETRIEVAL_TIMEOUT_MS:60000}
  max_retries: 2
  retry_backoff_ms: 200
  default_text_embedding_model_id: "${RAG_DEFAULT_TEXT_EMBEDDING_MODEL_ID}"
  default_image_embedding_model_id: "${RAG_DEFAULT_IMAGE_EMBEDDING_MODEL_ID}"
  # LLM model id sent in query_strategy.llm_model_id when the caller enables
  # rewrite / expansion / multi_query. REQUIRED by the deployed rag-web
  # container's validator when any of those booleans are true.
  default_llm_model_id: "${RAG_DEFAULT_LLM_MODEL_ID}"
  # Rerank model id sent in query_strategy.rerank_model_id when the caller
  # enables enable_rerank. REQUIRED by the deployed rag-web container's
  # validator when enable_rerank is true.
  default_rerank_model_id: "${RAG_DEFAULT_RERANK_MODEL_ID}"

# NOTE: no auth_token field. rag has no service-to-service auth; coze relies on
# network isolation (rag bound to internal Docker network). See spec §11 risk #1.

knowledge:
  backend: "${KNOWLEDGE_BACKEND:legacy}"  # legacy | rag
  tenant:
    mode: "${RAG_TENANT_MODE:env}"               # env (Phase 1) | user (Phase 2; future)
    default_tenant_id: "${RAG_TENANT_ID:coze}"   # used when mode=env
